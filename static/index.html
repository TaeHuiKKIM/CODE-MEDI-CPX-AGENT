<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE MEDI CPX Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white h-screen overflow-hidden font-sans antialiased">

<div class="flex h-full w-full">

    <!-- Left Column: Doctor's Note -->
    <div class="w-1/4 h-full p-6 border-r border-gray-700 flex flex-col bg-gray-800 shadow-xl">
        <div class="flex items-center space-x-3 mb-6">
            <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center shadow-lg shadow-blue-500/50">
                <i class="fas fa-user-md text-white"></i>
            </div>
            <h2 class="text-xl font-bold tracking-wide text-gray-100">Doctor's Note</h2>
        </div>
        <textarea id="doctor-note" class="flex-1 w-full bg-gray-900 border border-gray-700 rounded-xl p-4 text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none transition-all shadow-inner" placeholder="환자의 증상(OLDCAARTS), 과거력 등을 자유롭게 메모하세요..."></textarea>
    </div>

    <!-- Center Column: Chat & Voice -->
    <div class="w-2/4 h-full flex flex-col bg-gray-900 relative">
        <!-- Header -->
        <div class="h-20 border-b border-gray-800 flex items-center px-8 bg-gray-900/80 backdrop-blur-md z-10">
            <div>
                <h2 class="text-xl font-bold text-white flex items-center">
                    가상 환자: 김동아 (55/M)
                    <span class="ml-3 px-2 py-1 text-xs font-semibold bg-red-500/20 text-red-400 rounded-full border border-red-500/30">C.C: 두통</span>
                </h2>
                <p class="text-sm text-gray-400 mt-1">음성으로 질문하거나 텍스트를 입력하세요.</p>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-8 space-y-6 scroll-smooth">
            <!-- Initial System Message -->
            <div class="text-center">
                <span class="px-4 py-1 rounded-full bg-gray-800 text-gray-400 text-xs font-medium border border-gray-700">진료가 시작되었습니다. 환자에게 인사해 보세요.</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 bg-gray-800 border-t border-gray-700">
            <div class="flex items-end space-x-4">
                <div class="flex-1 relative">
                    <textarea id="chat-input" class="w-full bg-gray-900 border border-gray-700 rounded-2xl py-3 px-5 text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none max-h-32" rows="1" placeholder="환자에게 질문을 입력하세요..."></textarea>
                </div>
                <button id="send-btn" class="w-12 h-12 rounded-full bg-blue-600 hover:bg-blue-500 text-white flex items-center justify-center transition-all shadow-lg hover:shadow-blue-500/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-900 disabled:opacity-50">
                    <i class="fas fa-paper-plane"></i>
                </button>
                <button id="mic-btn" class="w-14 h-14 rounded-full bg-gray-700 hover:bg-gray-600 text-gray-300 flex items-center justify-center transition-all shadow-lg focus:outline-none border border-gray-600 relative group">
                    <div id="mic-pulse" class="absolute inset-0 rounded-full bg-red-500 opacity-0 scale-150 transition-all duration-300"></div>
                    <i class="fas fa-microphone text-xl z-10"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Right Column: Status & Evaluation -->
    <div class="w-1/4 h-full p-6 border-l border-gray-700 bg-gray-800 flex flex-col shadow-xl">
        
        <!-- Live Status -->
        <div class="mb-8">
            <div class="flex items-center space-x-3 mb-6">
                <div class="w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center shadow-lg shadow-emerald-500/50">
                    <i class="fas fa-heartbeat text-white"></i>
                </div>
                <h2 class="text-xl font-bold tracking-wide text-gray-100">Live Status</h2>
            </div>
            
            <div class="space-y-6 p-5 bg-gray-900 rounded-2xl border border-gray-700 shadow-inner">
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="font-semibold text-emerald-400">Rapport (라포)</span>
                        <span id="rapport-val" class="text-gray-300">50%</span>
                    </div>
                    <div class="h-2 w-full bg-gray-700 rounded-full overflow-hidden">
                        <div id="rapport-bar" class="h-full bg-gradient-to-r from-emerald-600 to-emerald-400 transition-all duration-500 ease-out" style="width: 50%"></div>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">공감할수록 호감도가 상승합니다.</p>
                </div>
                
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="font-semibold text-rose-400">Stress (스트레스)</span>
                        <span id="stress-val" class="text-gray-300">30%</span>
                    </div>
                    <div class="h-2 w-full bg-gray-700 rounded-full overflow-hidden">
                        <div id="stress-bar" class="h-full bg-gradient-to-r from-rose-600 to-rose-400 transition-all duration-500 ease-out" style="width: 30%"></div>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">추궁하거나 매몰차면 스트레스가 증가합니다.</p>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col justify-end">
            <!-- Evaluation Area -->
            <div id="eval-area" class="hidden flex-col h-full fade-in">
                <h3 class="text-lg font-bold text-blue-400 mb-4 border-b border-gray-700 pb-2">평가 결과 (CPX Report)</h3>
                <div class="relative flex-1 min-h-0 bg-gray-900 rounded-2xl border border-gray-700 p-4 mb-4 shadow-inner flex items-center justify-center">
                    <canvas id="eval-chart"></canvas>
                </div>
                <div id="eval-feedback" class="text-sm text-gray-300 bg-gray-900 p-4 rounded-xl border border-gray-700 h-32 overflow-y-auto custom-scrollbar">
                    피드백이 여기에 표시됩니다.
                </div>
            </div>

            <button id="evaluate-btn" class="w-full py-4 mt-6 rounded-xl bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-bold text-lg shadow-lg shadow-purple-500/30 transition-all transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 focus:ring-offset-gray-800">
                <i class="fas fa-clipboard-check mr-2"></i> 진료 종료 및 평가받기
            </button>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
