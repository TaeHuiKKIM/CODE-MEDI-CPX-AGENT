<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPX 에이전트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>">
</head>
<body class="bg-gray-50 text-gray-900 h-screen overflow-hidden font-sans antialiased selection:bg-pink-200">

<div class="flex h-full w-full max-w-[1600px] mx-auto bg-white shadow-2xl">

    <!-- Left Column: Doctor's Note -->
    <div class="w-1/4 h-full p-6 border-r border-gray-200 flex flex-col bg-white">
        <div class="flex items-center space-x-3 mb-6">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-pink-500 to-orange-400 flex items-center justify-center shadow-md">
                <i class="fas fa-stethoscope text-white"></i>
            </div>
            <h2 class="text-xl font-bold tracking-wide text-gray-800">Doctor's Note</h2>
        </div>
        <textarea id="doctor-note" class="flex-1 w-full bg-gray-50 border border-gray-200 rounded-2xl p-5 text-gray-700 focus:outline-none focus:ring-2 focus:ring-pink-400 focus:border-transparent resize-none transition-all shadow-inner" placeholder="환자의 증상(OLDCAARTS), 과거력 등을 자유롭게 메모하세요..."></textarea>
    </div>

    <!-- Center Column: Chat & Voice -->
    <div class="w-2/4 h-full flex flex-col bg-white relative">
        <!-- Header (Instagram Profile Style) -->
        <div class="h-20 border-b border-gray-200 flex items-center px-6 bg-white/90 backdrop-blur-md z-10 space-x-4">
            <!-- Instagram Story Ring Avatar -->
            <div class="w-12 h-12 rounded-full p-[2.5px] bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 flex-shrink-0 cursor-pointer transition-transform hover:scale-105">
                <div class="w-full h-full bg-white rounded-full flex items-center justify-center border-2 border-white overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Dongah&style=circle" alt="avatar" class="w-full h-full object-cover">
                </div>
            </div>
            <div>
                <h2 class="text-lg font-bold text-gray-900 flex items-center">
                    dongah_kim_55
                    <i class="fas fa-certificate text-blue-500 ml-1 text-sm" title="Verified Patient"></i>
                </h2>
                <p class="text-xs text-gray-500 font-medium">김동아 (55/M) • <span class="text-pink-500 font-bold">C.C: 두통</span></p>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 scroll-smooth bg-gray-50/50">
            <!-- Initial System Message -->
            <div class="text-center mt-4">
                <span class="px-4 py-1.5 rounded-full bg-white text-gray-400 text-xs font-semibold shadow-sm border border-gray-200">진료가 시작되었습니다. DM을 보내 인사해 보세요.</span>
            </div>
        </div>

        <!-- Input Area (Instagram DM Style) -->
        <div class="p-4 bg-white border-t border-gray-200">
            <div class="flex items-center space-x-3 bg-gray-100 rounded-full px-2 py-1 border border-transparent focus-within:border-gray-300 focus-within:bg-white transition-all shadow-inner">
                <button id="mic-btn" class="w-10 h-10 rounded-full text-gray-500 hover:text-pink-500 flex items-center justify-center transition-colors focus:outline-none relative group flex-shrink-0">
                    <div id="mic-pulse" class="absolute inset-0 rounded-full bg-pink-500 opacity-0 scale-150 transition-all duration-300"></div>
                    <i class="fas fa-microphone text-lg z-10"></i>
                </button>
                <div class="flex-1 relative">
                    <textarea id="chat-input" class="w-full bg-transparent py-3 px-2 text-gray-800 placeholder-gray-400 focus:outline-none resize-none max-h-24 leading-snug" rows="1" placeholder="메시지 입력..."></textarea>
                </div>
                <button id="send-btn" class="w-auto px-4 h-10 rounded-full text-blue-500 hover:text-blue-600 flex items-center justify-center transition-colors focus:outline-none disabled:opacity-50 flex-shrink-0 font-bold text-sm whitespace-nowrap">
                    보내기
                </button>
            </div>
        </div>
    </div>

    <!-- Right Column: Status & Evaluation -->
    <div class="w-1/4 h-full p-6 border-l border-gray-200 bg-white flex flex-col">
        
        <!-- Live Status -->
        <div class="mb-8">
            <div class="flex items-center space-x-3 mb-6">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-green-400 to-emerald-500 flex items-center justify-center shadow-md">
                    <i class="fas fa-heart text-white"></i>
                </div>
                <h2 class="text-xl font-bold tracking-wide text-gray-800">Status</h2>
            </div>
            
            <div class="space-y-6 p-5 bg-gray-50 rounded-2xl border border-gray-100 shadow-sm">
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="font-bold text-gray-700">Rapport (라포)</span>
                        <span id="rapport-val" class="text-gray-900 font-bold">50%</span>
                    </div>
                    <div class="h-2.5 w-full bg-gray-200 rounded-full overflow-hidden">
                        <div id="rapport-bar" class="h-full bg-gradient-to-r from-green-400 to-emerald-500 transition-all duration-500 ease-out" style="width: 50%"></div>
                    </div>
                </div>
                
                <div>
                    <div class="flex justify-between text-sm mb-2">
                        <span class="font-bold text-gray-700">Stress (스트레스)</span>
                        <span id="stress-val" class="text-gray-900 font-bold">30%</span>
                    </div>
                    <div class="h-2.5 w-full bg-gray-200 rounded-full overflow-hidden">
                        <div id="stress-bar" class="h-full bg-gradient-to-r from-orange-400 to-pink-500 transition-all duration-500 ease-out" style="width: 30%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col justify-end">
            <button id="evaluate-btn" class="w-full py-3.5 mt-auto rounded-xl bg-gradient-to-r from-purple-500 via-pink-500 to-orange-400 hover:from-purple-600 hover:via-pink-600 hover:to-orange-500 text-white font-bold shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 focus:outline-none">
                <i class="fas fa-check-circle mr-1"></i> 진료 종료 (채점)
            </button>
        </div>
    </div>
</div>

<!-- Full-screen Evaluation Modal -->
<div id="eval-modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4 md:p-12 fade-in">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl h-full max-h-[85vh] flex flex-col overflow-hidden transform transition-all">
        <!-- Header -->
        <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gradient-to-r from-purple-50 to-pink-50">
            <h2 class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500 tracking-tight">CPX 진료 평가 리포트</h2>
            <button id="close-modal-btn" class="text-gray-400 hover:text-gray-700 transition-colors focus:outline-none">
                <i class="fas fa-times text-2xl"></i>
            </button>
        </div>
        
        <!-- Content -->
        <div class="flex-1 overflow-y-auto p-6 md:p-10 flex flex-col md:flex-row gap-10 bg-white">
            <!-- Chart Area -->
            <div class="w-full md:w-5/12 flex flex-col items-center justify-center">
                <div class="w-full aspect-square bg-gray-50/50 rounded-3xl border border-gray-100 p-6 flex items-center justify-center shadow-inner">
                    <canvas id="eval-chart"></canvas>
                </div>
            </div>
            
            <!-- Feedback Area -->
            <div class="w-full md:w-7/12 flex flex-col">
                <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fas fa-comment-medical text-pink-500 mr-2 text-2xl"></i> 상세 피드백
                </h3>
                <div id="eval-feedback" class="flex-1 bg-gray-50 p-6 rounded-3xl border border-gray-100 overflow-y-auto custom-scrollbar text-gray-700 leading-relaxed text-base md:text-lg whitespace-pre-wrap shadow-inner">
                    피드백이 여기에 표시됩니다.
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="p-6 border-t border-gray-100 bg-gray-50 flex justify-end">
            <button id="restart-btn" class="px-8 py-3.5 rounded-xl bg-gray-900 hover:bg-black text-white font-bold shadow-lg transition-all transform hover:-translate-y-0.5 focus:outline-none">
                <i class="fas fa-redo-alt mr-2"></i>새로운 진료 시작하기
            </button>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
